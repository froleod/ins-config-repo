server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://auth-postgres:5432/authdb
    username: auth_user
    password: auth_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: SUPER_SECRET_JWT_KEY_CHANGE_IN_PRODUCTION
  expiration: 3600000
  refresh-expiration: 2592000000
