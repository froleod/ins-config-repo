apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-simulator-service
  namespace: ins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-simulator-service
  template:
    metadata:
      labels:
        app: iot-simulator-service
    spec:
      containers:
        - name: iot-simulator-service
          image: iot-simulator-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8085
          env:
            - name: SPRING_APPLICATION_NAME
              value: "iot-simulator-service"
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://config-service:8888"
            - name: SPRING_CLOUD_CONFIG_FAIL_FAST
              value: "true"
            - name: SPRING_CLOUD_CONFIG_RETRY_MAX_ATTEMPTS
              value: "20"
            - name: SPRING_CLOUD_CONFIG_RETRY_INITIAL_INTERVAL
              value: "1000"
---
apiVersion: v1
kind: Service
metadata:
  name: iot-simulator-service
  namespace: ins
spec:
  selector:
    app: iot-simulator-service
  ports:
    - name: http
      port: 8085
      targetPort: 8085
  type: ClusterIP